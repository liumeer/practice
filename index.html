<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>практика</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Lora:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0ece4;
    --bg-soft: #e8e3d9;
    --ink: #2a2825;
    --ink-soft: #5a564f;
    --ink-muted: #8a8278;
    --line: #d8d0c4;
    --line-soft: #e0d9cd;
    --accent: #5d6b5a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Lora', Georgia, serif;
    font-size: 17px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior: none;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  .app {
    flex: 1;
    max-width: 480px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 28px 48px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    min-height: 100dvh;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 56px;
  }

  .top-bar .crumb { font-style: normal; }

  .top-bar a {
    color: var(--ink-muted);
    text-decoration: none;
    cursor: pointer;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color 0.3s, border-color 0.3s;
  }
  .top-bar a:hover { color: var(--ink); border-bottom-color: var(--ink-soft); }

  .view {
    flex: 1;
    display: flex;
    flex-direction: column;
    animation: fade 0.5s ease-out;
  }

  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ====== HOME ====== */
  .home-status {
    margin-bottom: 64px;
    color: var(--ink-soft);
    font-size: 15px;
    line-height: 1.7;
  }
  .home-status .last-line {
    font-style: italic;
    color: var(--ink-muted);
  }

  .home-buttons {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-bottom: 56px;
  }

  .big-btn {
    background: none;
    border: none;
    border-top: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 400;
    font-style: italic;
    padding: 28px 4px;
    text-align: left;
    cursor: pointer;
    transition: padding 0.4s ease, color 0.3s;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .big-btn:last-of-type { border-bottom: 1px solid var(--line); }
  .big-btn:hover, .big-btn:active { padding-left: 14px; color: var(--accent); }

  .big-btn .arrow {
    font-style: normal;
    font-family: 'Lora', serif;
    font-size: 18px;
    color: var(--ink-muted);
    font-weight: 300;
  }

  .home-meta {
    margin-top: auto;
    padding-top: 32px;
    display: flex;
    gap: 28px;
    flex-wrap: wrap;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .home-meta a {
    color: var(--ink-muted);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.3s;
  }
  .home-meta a:hover { color: var(--ink); }

  /* ====== QUESTIONS ====== */
  .question-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 24px 0 48px;
  }

  .q-counter {
    font-family: 'Lora', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 32px;
  }

  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 36px;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 44px;
  }

  /* ----- inputs ----- */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 24px;
  }
  .chip {
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink-soft);
    font-family: 'Lora', serif;
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 0;
    cursor: pointer;
    transition: all 0.25s;
  }
  .chip:hover { border-color: var(--ink-soft); color: var(--ink); }
  .chip.selected {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .num-quick {
    display: flex;
    gap: 0;
    margin-bottom: 20px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .num-quick button {
    flex: 1;
    background: transparent;
    border: none;
    border-right: 1px solid var(--line);
    color: var(--ink-soft);
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    padding: 18px 0;
    cursor: pointer;
    transition: all 0.25s;
  }
  .num-quick button:last-child { border-right: none; }
  .num-quick button:hover { background: var(--bg-soft); color: var(--ink); }
  .num-quick button.selected { background: var(--ink); color: var(--bg); }

  input[type="number"], input[type="text"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    padding: 8px 0 12px;
    outline: none;
    transition: border-color 0.3s;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input:focus { border-bottom-color: var(--ink); }
  input::placeholder { color: var(--ink-muted); font-style: italic; opacity: 0.6; }

  textarea {
    width: 100%;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Lora', serif;
    font-size: 16px;
    line-height: 1.55;
    padding: 14px 14px;
    outline: none;
    resize: none;
    min-height: 110px;
    transition: border-color 0.3s;
  }
  textarea:focus { border-color: var(--ink-soft); }
  textarea::placeholder { color: var(--ink-muted); font-style: italic; opacity: 0.6; }

  .nav-row {
    margin-top: auto;
    padding-top: 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .text-link {
    background: none;
    border: none;
    font-family: 'Lora', serif;
    font-size: 14px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
    cursor: pointer;
    padding: 10px 0;
    transition: color 0.3s;
  }
  .text-link:hover { color: var(--ink); }
  .text-link.primary { color: var(--ink); }
  .text-link.primary:hover { color: var(--accent); }
  .text-link:disabled { color: var(--line); cursor: not-allowed; }

  /* ====== SUMMARY ====== */
  .summary-block {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 22px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .summary-row:first-child { border-top: 1px solid var(--line); }
  .summary-label {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--ink-soft);
    letter-spacing: 0.05em;
  }
  .summary-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 400;
    color: var(--ink);
  }
  .summary-value .unit {
    font-size: 14px;
    color: var(--ink-muted);
    font-family: 'Lora', serif;
    margin-left: 6px;
    letter-spacing: 0.08em;
  }

  .obstacle-list {
    padding: 18px 0;
    border-bottom: 1px solid var(--line-soft);
  }
  .obstacle-list .summary-label { display: block; margin-bottom: 12px; }
  .obstacle-item {
    display: flex;
    justify-content: space-between;
    font-family: 'Lora', serif;
    font-size: 16px;
    color: var(--ink);
    padding: 6px 0;
  }
  .obstacle-item .count { color: var(--ink-muted); font-size: 14px; }

  .summary-empty {
    color: var(--ink-muted);
    font-style: italic;
    text-align: center;
    padding: 60px 0;
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
  }

  /* ====== HISTORY ====== */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .history-item {
    padding: 20px 0;
    border-bottom: 1px solid var(--line-soft);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .history-item:first-child { border-top: 1px solid var(--line); }
  .history-date {
    font-family: 'Lora', serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .history-line {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--ink);
    margin-top: 2px;
  }
  .history-line .sep { color: var(--ink-muted); margin: 0 8px; }
  .history-note {
    font-family: 'Lora', serif;
    font-size: 14px;
    color: var(--ink-soft);
    font-style: italic;
    margin-top: 4px;
  }
  .history-incomplete {
    font-family: 'Lora', serif;
    font-size: 13px;
    color: var(--ink-muted);
    letter-spacing: 0.1em;
  }

  /* ====== UTILITY ====== */
  .hidden { display: none !important; }

  .center-text {
    text-align: center;
    color: var(--ink-muted);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    padding: 60px 0;
  }

  /* small note */
  .micro-note {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    margin-top: 12px;
    line-height: 1.5;
  }

  /* dialog */
  .dialog-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(42, 40, 37, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 100;
    animation: fade 0.3s ease-out;
  }
  .dialog {
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 32px 28px 24px;
    max-width: 380px;
    width: 100%;
  }
  .dialog-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 24px;
  }
  .dialog-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// =====================================================
//  STATE
// =====================================================
const STORAGE_KEY = 'sessions:v1';
let state = {
  view: 'home',           // 'home' | 'before' | 'after' | 'summary' | 'history'
  sessions: [],
  // in-flight protocol answers
  draft: null,
  // for after: which session we're closing (or null = standalone)
  closingSessionId: null,
  // current question index in protocol
  qIndex: 0,
  // dialog
  dialog: null
};

// =====================================================
//  STORAGE
// =====================================================
async function loadSessions() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) {
      state.sessions = JSON.parse(r.value);
    }
  } catch (e) {
    state.sessions = [];
  }
}

async function saveSessions() {
  try {
    await window.storage.set(STORAGE_KEY, JSON.stringify(state.sessions));
  } catch (e) {
    console.error('save failed', e);
  }
}

// =====================================================
//  HELPERS
// =====================================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function fmtDate(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diffDays = Math.floor((now - d) / (1000 * 60 * 60 * 24));
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  if (diffDays === 0) return 'сегодня';
  if (diffDays === 1) return 'вчера';
  if (diffDays < 7) return diffDays + ' дн назад';
  return d.getDate() + ' ' + months[d.getMonth()];
}

function fmtTime(iso) {
  const d = new Date(iso);
  return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
}

function declMin(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'минута';
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'минуты';
  return 'минут';
}

function declSes(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return 'сессия';
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'сессии';
  return 'сессий';
}

function findOpenSession() {
  return state.sessions.find(s => s.before && !s.after);
}

// =====================================================
//  PROTOCOLS
// =====================================================
const beforeProtocol = [
  {
    key: 'plannedMinutes',
    text: 'Сколько минут.',
    type: 'minutes-quick',
    quickValues: [10, 15, 20, 25, 30, 45]
  },
  {
    key: 'support',
    text: 'Опора.',
    type: 'chips',
    options: ['дыхание', 'тело', 'звук', 'открытое присутствие', 'другое']
  },
  {
    key: 'state',
    text: 'Состояние сейчас. Одним словом.',
    type: 'text',
    placeholder: 'усталость / ясность / тревога / ровно...'
  }
];

const afterProtocol = [
  {
    key: 'actualMinutes',
    text: 'Сколько просидела.',
    type: 'minutes-quick',
    quickValues: [10, 15, 20, 25, 30, 45]
  },
  {
    key: 'obstacle',
    text: 'Главное препятствие.',
    type: 'chips',
    options: ['сонливость', 'беспокойство', 'сомнение', 'желание', 'раздражение', 'ничего из этого']
  },
  {
    key: 'settled',
    text: 'Был ли момент устойчивости. Хотя бы коротко.',
    type: 'chips',
    options: ['да', 'нет', 'не уверена']
  },
  {
    key: 'note',
    text: 'Что заметила про сам процесс наблюдения.',
    type: 'textarea',
    placeholder: 'одна-две фразы. или «ничего».'
  }
];

// =====================================================
//  RENDER
// =====================================================
const app = document.getElementById('app');

function render() {
  app.innerHTML = '';
  switch (state.view) {
    case 'home': renderHome(); break;
    case 'before': renderProtocol('before'); break;
    case 'after': renderProtocol('after'); break;
    case 'summary': renderSummary(); break;
    case 'history': renderHistory(); break;
  }
  if (state.dialog) renderDialog();
}

// ----- HOME -----
function renderHome() {
  const open = findOpenSession();
  const last = state.sessions
    .filter(s => s.after)
    .sort((a, b) => new Date(b.after.completedAt) - new Date(a.after.completedAt))[0];

  let statusHtml = '';
  if (open) {
    statusHtml = `
      <div>сессия открыта — ${fmtTime(open.before.startedAt)}</div>
      <div class="last-line">${open.before.plannedMinutes} ${declMin(open.before.plannedMinutes)}, ${open.before.support}</div>
    `;
  } else if (last) {
    statusHtml = `
      <div>последняя — ${fmtDate(last.after.completedAt)}</div>
      <div class="last-line">${last.after.actualMinutes} ${declMin(last.after.actualMinutes)} · ${last.after.obstacle}</div>
    `;
  } else {
    statusHtml = `<div class="last-line">пока ничего не записано</div>`;
  }

  const view = document.createElement('div');
  view.className = 'view';
  view.innerHTML = `
    <div class="top-bar">
      <span class="crumb">практика</span>
      <span class="crumb">${new Date().toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' })}</span>
    </div>

    <div class="home-status">${statusHtml}</div>

    <div class="home-buttons">
      <button class="big-btn" data-action="before">
        <span>до</span><span class="arrow">→</span>
      </button>
      <button class="big-btn" data-action="after">
        <span>после</span><span class="arrow">→</span>
      </button>
    </div>

    <div class="home-meta">
      <a data-action="summary">сводка</a>
      <a data-action="history">все сессии</a>
    </div>
  `;
  app.appendChild(view);

  view.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => handleAction(el.dataset.action));
  });
}

function handleAction(action) {
  if (action === 'before') startBefore();
  else if (action === 'after') startAfter();
  else if (action === 'summary') { state.view = 'summary'; render(); }
  else if (action === 'history') { state.view = 'history'; render(); }
}

// ----- START FLOWS -----
function startBefore() {
  const open = findOpenSession();
  if (open) {
    showDialog(
      'Уже есть открытая сессия. Закрыть её и начать новую?',
      [
        { label: 'отмена', action: () => closeDialog() },
        { label: 'начать новую', primary: true, action: () => {
          // discard the open one
          state.sessions = state.sessions.filter(s => s.id !== open.id);
          saveSessions();
          closeDialog();
          beginProtocol('before');
        }}
      ]
    );
    return;
  }
  beginProtocol('before');
}

function startAfter() {
  beginProtocol('after');
}

function beginProtocol(kind) {
  state.draft = {};
  state.qIndex = 0;
  state.view = kind;
  render();
}

// ----- PROTOCOL RENDER -----
function renderProtocol(kind) {
  const protocol = kind === 'before' ? beforeProtocol : afterProtocol;
  const q = protocol[state.qIndex];
  const total = protocol.length;
  const current = state.qIndex + 1;

  const view = document.createElement('div');
  view.className = 'view';

  view.innerHTML = `
    <div class="top-bar">
      <a data-action="cancel">← отмена</a>
      <span class="crumb">${kind === 'before' ? 'до' : 'после'}</span>
    </div>
    <div class="question-screen">
      <div class="q-counter">${current} / ${total}</div>
      <div class="q-text">${q.text}</div>
      <div id="q-input"></div>
      <div class="nav-row">
        ${state.qIndex > 0
          ? `<button class="text-link" data-action="back">назад</button>`
          : `<span></span>`}
        <button class="text-link primary" id="next-btn" data-action="next">${current === total ? 'сохранить' : 'далее'} →</button>
      </div>
    </div>
  `;
  app.appendChild(view);

  // attach back/cancel
  view.querySelector('[data-action="cancel"]').addEventListener('click', () => {
    state.draft = null;
    state.qIndex = 0;
    state.view = 'home';
    render();
  });

  const backBtn = view.querySelector('[data-action="back"]');
  if (backBtn) backBtn.addEventListener('click', () => {
    state.qIndex--;
    render();
  });

  view.querySelector('#next-btn').addEventListener('click', () => advanceProtocol(kind));

  renderQuestionInput(q);
  validateNext(q);
}

function renderQuestionInput(q) {
  const container = document.getElementById('q-input');
  const draftVal = state.draft[q.key];

  if (q.type === 'minutes-quick') {
    const wrap = document.createElement('div');
    const quick = document.createElement('div');
    quick.className = 'num-quick';
    q.quickValues.forEach(v => {
      const btn = document.createElement('button');
      btn.textContent = v;
      if (draftVal === v) btn.classList.add('selected');
      btn.addEventListener('click', () => {
        state.draft[q.key] = v;
        // refresh the chip selection
        quick.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const inp = wrap.querySelector('input');
        if (inp) inp.value = '';
        validateNext(q);
      });
      quick.appendChild(btn);
    });
    wrap.appendChild(quick);

    const customRow = document.createElement('div');
    customRow.style.marginTop = '20px';
    customRow.innerHTML = `<input type="number" min="1" max="999" inputmode="numeric" placeholder="свое число" />`;
    const inp = customRow.querySelector('input');
    if (draftVal && !q.quickValues.includes(draftVal)) inp.value = draftVal;
    inp.addEventListener('input', () => {
      const v = parseInt(inp.value, 10);
      state.draft[q.key] = isNaN(v) ? null : v;
      quick.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      validateNext(q);
    });
    wrap.appendChild(customRow);
    container.appendChild(wrap);
  }

  else if (q.type === 'chips') {
    const chips = document.createElement('div');
    chips.className = 'chips';
    q.options.forEach(opt => {
      const c = document.createElement('button');
      c.className = 'chip';
      c.textContent = opt;
      if (draftVal === opt) c.classList.add('selected');
      c.addEventListener('click', () => {
        state.draft[q.key] = opt;
        chips.querySelectorAll('.chip').forEach(x => x.classList.remove('selected'));
        c.classList.add('selected');
        validateNext(q);
      });
      chips.appendChild(c);
    });
    container.appendChild(chips);
  }

  else if (q.type === 'text') {
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = q.placeholder || '';
    if (draftVal) inp.value = draftVal;
    inp.addEventListener('input', () => {
      state.draft[q.key] = inp.value.trim();
      validateNext(q);
    });
    container.appendChild(inp);
    setTimeout(() => inp.focus(), 100);
  }

  else if (q.type === 'textarea') {
    const ta = document.createElement('textarea');
    ta.placeholder = q.placeholder || '';
    if (draftVal) ta.value = draftVal;
    ta.addEventListener('input', () => {
      state.draft[q.key] = ta.value.trim();
      validateNext(q);
    });
    container.appendChild(ta);
    setTimeout(() => ta.focus(), 100);
  }
}

function validateNext(q) {
  const btn = document.getElementById('next-btn');
  if (!btn) return;
  const v = state.draft[q.key];
  const ok = (q.type === 'textarea')
    ? true   // note can be empty (we'll save 'ничего' if empty)
    : (v !== undefined && v !== null && v !== '');
  btn.disabled = !ok;
}

function advanceProtocol(kind) {
  const protocol = kind === 'before' ? beforeProtocol : afterProtocol;
  const q = protocol[state.qIndex];

  // for textarea, normalize empty to "ничего"
  if (q.type === 'textarea' && (!state.draft[q.key] || state.draft[q.key].trim() === '')) {
    state.draft[q.key] = 'ничего';
  }

  if (state.qIndex < protocol.length - 1) {
    state.qIndex++;
    render();
  } else {
    finishProtocol(kind);
  }
}

async function finishProtocol(kind) {
  if (kind === 'before') {
    const session = {
      id: uid(),
      before: {
        ...state.draft,
        startedAt: new Date().toISOString()
      },
      after: null
    };
    state.sessions.push(session);
    await saveSessions();
  } else {
    // after: pair with open session if exists, else create standalone
    const open = findOpenSession();
    if (open) {
      open.after = {
        ...state.draft,
        completedAt: new Date().toISOString()
      };
    } else {
      state.sessions.push({
        id: uid(),
        before: null,
        after: {
          ...state.draft,
          completedAt: new Date().toISOString()
        }
      });
    }
    await saveSessions();
  }
  state.draft = null;
  state.qIndex = 0;
  state.view = 'home';
  render();
}

// ----- SUMMARY -----
function renderSummary() {
  const view = document.createElement('div');
  view.className = 'view';

  const now = new Date();
  const sevenDaysAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);
  const recent = state.sessions.filter(s =>
    s.after && new Date(s.after.completedAt) >= sevenDaysAgo
  );

  let bodyHtml = '';
  if (recent.length === 0) {
    bodyHtml = `<div class="summary-empty">за последние семь дней — ничего</div>`;
  } else {
    const totalMin = recent.reduce((sum, s) => sum + (s.after.actualMinutes || 0), 0);
    const avg = Math.round(totalMin / recent.length);
    const obstacleCounts = {};
    recent.forEach(s => {
      const o = s.after.obstacle;
      obstacleCounts[o] = (obstacleCounts[o] || 0) + 1;
    });
    const topObstacles = Object.entries(obstacleCounts)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 3);
    const settledCount = recent.filter(s => s.after.settled === 'да').length;

    bodyHtml = `
      <div class="summary-block">
        <div class="summary-row">
          <span class="summary-label">сессии</span>
          <span class="summary-value">${recent.length}</span>
        </div>
        <div class="summary-row">
          <span class="summary-label">общее время</span>
          <span class="summary-value">${totalMin}<span class="unit">мин</span></span>
        </div>
        <div class="summary-row">
          <span class="summary-label">средняя</span>
          <span class="summary-value">${avg}<span class="unit">мин</span></span>
        </div>
        <div class="summary-row">
          <span class="summary-label">моменты устойчивости</span>
          <span class="summary-value">${settledCount}</span>
        </div>
        <div class="obstacle-list">
          <div class="summary-label">препятствия</div>
          ${topObstacles.map(([name, count]) =>
            `<div class="obstacle-item"><span>${name}</span><span class="count">${count}</span></div>`
          ).join('')}
        </div>
      </div>
      <div class="micro-note">за последние 7 дней. без выводов.</div>
    `;
  }

  view.innerHTML = `
    <div class="top-bar">
      <a data-action="back">← назад</a>
      <span class="crumb">сводка</span>
    </div>
    ${bodyHtml}
  `;
  app.appendChild(view);
  view.querySelector('[data-action="back"]').addEventListener('click', () => {
    state.view = 'home';
    render();
  });
}

// ----- HISTORY -----
function renderHistory() {
  const view = document.createElement('div');
  view.className = 'view';

  const all = [...state.sessions].sort((a, b) => {
    const aT = a.after ? a.after.completedAt : a.before.startedAt;
    const bT = b.after ? b.after.completedAt : b.before.startedAt;
    return new Date(bT) - new Date(aT);
  });

  let bodyHtml = '';
  if (all.length === 0) {
    bodyHtml = `<div class="summary-empty">пусто</div>`;
  } else {
    bodyHtml = `<div class="history-list">${all.map(s => {
      const ts = s.after ? s.after.completedAt : s.before.startedAt;
      if (s.after) {
        return `
          <div class="history-item">
            <div class="history-date">${fmtDate(ts)} · ${fmtTime(ts)}</div>
            <div class="history-line">
              ${s.after.actualMinutes} <span style="font-size:14px;color:var(--ink-muted);font-family:'Lora',serif">${declMin(s.after.actualMinutes)}</span>
              <span class="sep">·</span>${s.after.obstacle}
              ${s.after.settled === 'да' ? '<span class="sep">·</span><span style="color:var(--accent);font-style:italic">устойчиво</span>' : ''}
            </div>
            ${s.after.note && s.after.note !== 'ничего'
              ? `<div class="history-note">«${s.after.note}»</div>`
              : ''}
          </div>
        `;
      } else {
        return `
          <div class="history-item">
            <div class="history-date">${fmtDate(ts)} · ${fmtTime(ts)}</div>
            <div class="history-incomplete">открытая сессия — ${s.before.plannedMinutes} ${declMin(s.before.plannedMinutes)}, ${s.before.support}</div>
          </div>
        `;
      }
    }).join('')}</div>
    <div class="micro-note">всего: ${all.length} ${declSes(all.length)}.</div>
    `;
  }

  view.innerHTML = `
    <div class="top-bar">
      <a data-action="back">← назад</a>
      <span class="crumb">все сессии</span>
    </div>
    ${bodyHtml}
  `;
  app.appendChild(view);
  view.querySelector('[data-action="back"]').addEventListener('click', () => {
    state.view = 'home';
    render();
  });
}

// ----- DIALOG -----
function showDialog(text, actions) {
  state.dialog = { text, actions };
  render();
}
function closeDialog() {
  state.dialog = null;
  render();
}

function renderDialog() {
  const back = document.createElement('div');
  back.className = 'dialog-backdrop';
  const dlg = document.createElement('div');
  dlg.className = 'dialog';
  dlg.innerHTML = `
    <div class="dialog-text">${state.dialog.text}</div>
    <div class="dialog-actions"></div>
  `;
  const actions = dlg.querySelector('.dialog-actions');
  state.dialog.actions.forEach(a => {
    const b = document.createElement('button');
    b.className = 'text-link' + (a.primary ? ' primary' : '');
    b.textContent = a.label;
    b.addEventListener('click', a.action);
    actions.appendChild(b);
  });
  back.appendChild(dlg);
  app.appendChild(back);
}

// =====================================================
//  INIT
// =====================================================
(async function init() {
  await loadSessions();
  render();
})();
</script>
</body>
</html>
